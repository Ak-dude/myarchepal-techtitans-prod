name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"

jobs:
  # ── Job 1: Type-check & lint ────────────────────────────────────────────────
  typecheck-lint:
    name: Type-check · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Job 2: Vite production build ────────────────────────────────────────────
  # Verifies the app actually compiles — type-check alone won't catch Vite
  # plugin errors, missing assets, or broken dynamic imports.
  build:
    name: Vite production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Dummy env vars so firebase.ts and azure-openai.ts initialise without
        # throwing at import time.  Real secrets are never needed at build time.
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy-project
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:dummy"
          VITE_FIREBASE_MEASUREMENT_ID: G-DUMMY000000
          VITE_FIREBASE_DATABASE_URL: https://dummy-default-rtdb.firebaseio.com
          VITE_AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com
          VITE_AZURE_OPENAI_API_KEY: dummy-key
          VITE_AZURE_OPENAI_DEPLOYMENT_NAME: gpt-4o
          VITE_AZURE_OPENAI_API_VERSION: "2024-02-15-preview"
          VITE_ARCHAEOLOGIST_VERIFICATION_CODE: dummy
          VITE_FEEDBACK_VALIDATION_CODE: dummy
          VITE_APP_URL: https://dummy.vercel.app
          VITE_MAX_UPLOAD_MB: "20"

      # Keep the compiled output for 7 days so other jobs / manual debugging
      # can inspect it without rebuilding.
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
